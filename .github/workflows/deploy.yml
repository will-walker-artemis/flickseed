name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build
        env:
          # VITE_BASE_PATH must match the repo name so asset URLs resolve under
          # https://<owner>.github.io/<repo>/. github.event.repository.name is
          # available in workflow_dispatch and push events.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          VITE_GH_OWNER: ${{ github.repository_owner }}
          VITE_GH_REPO: ${{ github.event.repository.name }}
          VITE_GH_BRANCH: main
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
